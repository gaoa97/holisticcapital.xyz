<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <title>Holistic Capital Logo - Corrected Corner-to-Corner Geometric</title>
  <desc>Clean geometric reconstruction. Grey C stays rounded; white C is layered above; central grey connector aligns exactly with the white C mouth from corner to corner with no gap.</desc>
